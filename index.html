<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>背单词</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="vocab_think_starter.js"></script>
    <script src="vocab_waiyan_1.js"></script>
    <script src="vocab_detail.js"></script>
</head>

<body>

    <div class="header">
        <div class="header-row">
            <div class="user-badge" id="userBadge" onclick="handleUserBadge()" style="display:none;">
                <span class="badge-icon">👤</span>
                <span id="userNameLabel"></span>
            </div>
            <h1>VOCAB</h1>
            <button class="auto-play-toggle" id="autoPlayToggle" onclick="toggleAutoPlay()">
                <span class="toggle-icon" id="autoPlayIcon">🔇</span>
                <span id="autoPlayLabel">静音</span>
            </button>
        </div>
        <div class="subtitle" id="subtitle"></div>
    </div>

    <div class="progress-bar" id="progressBar" style="display:none;">
        <div class="bar-track"><div class="bar-fill" id="progressFill"></div></div>
        <div class="stats">
            <span id="roundInfo">第 1 轮</span>
            <span id="countInfo"></span>
        </div>
    </div>

    <div class="main-area" id="mainArea"></div>

    <script src="app.js"></script>
</body>
</html>
