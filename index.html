<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>背单词</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="vocab_think_starter.js"></script>
    <script src="vocab_waiyan_1.js"></script>
    <script src="vocab_detail.js"></script>

    <style>
        :root {
            --bg: #f8f4ec;
            --surface: #ffffff;
            --accent: #d08858;
            --text-primary: #2a2018;
            --text-muted: #a09080;
            --success: #5a9a6e;
            --danger: #c85550;
            --shadow: rgba(120, 100, 80, 0.12);
            --border-light: rgba(0, 0, 0, 0.08);
            --bg-subtle: rgba(0, 0, 0, 0.04);
            --success-bg: rgba(90, 154, 110, 0.12);
            --success-border: rgba(90, 154, 110, 0.25);
            --danger-bg: rgba(200, 85, 80, 0.12);
            --danger-border: rgba(200, 85, 80, 0.25);
            --accent-bg: rgba(208, 136, 88, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { width: 100%; max-width: 480px; padding: 20px 20px 8px; text-align: center; }

        .header h1 {
            font-family: 'Inter', sans-serif; font-size: 1.3rem;
            font-weight: 800; letter-spacing: 0.03em;
        }

        .subtitle { color: var(--text-muted); font-size: 0.78rem; margin-top: 2px; }

        .header-row {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 0;
        }

        .user-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--bg-subtle);
            color: var(--text-muted); font-size: 0.72rem;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }

        .user-badge:hover { border-color: var(--accent); color: var(--accent); }
        .user-badge .badge-icon { font-size: 0.82rem; line-height: 1; }

        .auto-play-toggle {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--bg-subtle);
            color: var(--text-muted); font-size: 0.72rem;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 600; cursor: pointer;
            transition: all 0.2s; user-select: none;
            flex-shrink: 0;
        }

        .auto-play-toggle:hover { border-color: var(--accent); color: var(--accent); }

        .auto-play-toggle.active {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent);
        }

        .auto-play-toggle .toggle-icon { font-size: 0.82rem; line-height: 1; }

        .progress-bar { width: 100%; max-width: 480px; padding: 20px 20px 0; }

        .bar-track {
            height: 4px; background: var(--border-light);
            border-radius: 2px; overflow: hidden;
        }

        .bar-fill {
            height: 100%; background: var(--accent);
            border-radius: 2px; width: 0%; transition: width 0.4s ease;
        }

        .stats {
            display: flex; justify-content: space-between;
            font-size: 0.73rem; color: var(--text-muted); margin-top: 6px;
        }

        .main-area {
            flex: 1; width: 100%; max-width: 480px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .login-card {
            width: 100%; background: var(--surface); border-radius: 20px;
            padding: 40px 28px 36px; text-align: center;
            box-shadow: 0 4px 24px var(--shadow);
            border: 1px solid var(--border-light);
        }

        .login-icon { font-size: 2.8rem; margin-bottom: 16px; }

        .login-title {
            font-family: 'Inter', sans-serif; font-size: 1.3rem;
            font-weight: 800; margin-bottom: 6px;
        }

        .login-desc {
            color: var(--text-muted); font-size: 0.82rem; margin-bottom: 28px;
            line-height: 1.6;
        }

        .login-input {
            width: 100%; padding: 14px 18px; border-radius: 12px;
            border: 1.5px solid rgba(0,0,0,0.12);
            background: var(--bg); color: var(--text-primary);
            font-size: 1rem; font-family: 'Noto Sans SC', sans-serif;
            font-weight: 600; text-align: center;
            outline: none; transition: border-color 0.2s;
        }

        .login-input:focus { border-color: var(--accent); }
        .login-input::placeholder { color: var(--text-muted); font-weight: 400; }

        .login-btn {
            width: 100%; padding: 14px; margin-top: 16px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 14px; font-size: 1rem;
            font-weight: 700; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
            transition: transform 0.15s, opacity 0.15s;
        }

        .login-btn:active { transform: scale(0.97); }
        .login-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .user-chips {
            display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: center; margin-top: 8px;
        }

        .user-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px; border-radius: 14px;
            border: 1.5px solid var(--border-light);
            background: var(--bg-subtle);
            color: var(--text-primary); font-size: 0.9rem;
            font-weight: 600; cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.15s;
        }

        .user-chip:hover { border-color: var(--accent); }

        .user-chip.is-last {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 700;
        }

        .user-chip .chip-delete {
            display: none; width: 20px; height: 20px;
            border-radius: 50%; background: var(--danger);
            color: #fff; font-size: 0.72rem; font-weight: 700;
            border: none; cursor: pointer; line-height: 20px;
            text-align: center; padding: 0; flex-shrink: 0;
            transition: transform 0.12s;
        }

        .user-chip .chip-delete:active { transform: scale(0.9); }
        .manage-mode .user-chip { cursor: default; }
        .manage-mode .user-chip .chip-delete { display: block; }

        .manage-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--bg-subtle);
            color: var(--text-muted); font-size: 0.75rem;
            font-weight: 600; cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.15s; margin-top: 16px;
        }

        .manage-btn:hover { border-color: var(--accent); color: var(--accent); }

        .manage-btn.active {
            background: var(--danger-bg);
            border-color: var(--danger);
            color: var(--danger);
        }

        .delete-overlay {
            position: fixed; inset: 0;
            background: rgba(42, 32, 24, 0.4);
            z-index: 200; display: flex;
            align-items: center; justify-content: center;
            padding: 20px;
        }

        .delete-dialog {
            background: var(--surface); border-radius: 20px;
            padding: 28px 24px 24px; width: 100%; max-width: 340px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
            border: 1px solid var(--border-light);
        }

        .delete-dialog-title {
            font-size: 1rem; font-weight: 700;
            text-align: center; margin-bottom: 8px;
        }

        .delete-dialog-subtitle {
            text-align: center; font-size: 0.82rem;
            color: var(--text-muted); margin-bottom: 20px;
            line-height: 1.6;
        }

        .delete-option {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px 14px; border-radius: 12px;
            border: 1.5px solid var(--border-light);
            background: var(--bg-subtle);
            cursor: pointer; transition: all 0.15s;
            margin-bottom: 10px;
        }

        .delete-option:hover { border-color: rgba(0,0,0,0.18); }

        .delete-option.selected {
            border-color: var(--accent);
            background: var(--accent-bg);
        }

        .delete-option input[type="radio"] { display: none; }

        .option-dot {
            width: 18px; height: 18px; flex-shrink: 0;
            border: 2px solid rgba(0,0,0,0.2); border-radius: 50%;
            margin-top: 1px; position: relative;
            transition: all 0.15s;
        }

        .delete-option.selected .option-dot { border-color: var(--accent); }

        .delete-option.selected .option-dot::after {
            content: '';
            position: absolute; top: 3px; left: 3px;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent);
        }

        .option-text { flex: 1; }
        .option-title { font-size: 0.88rem; font-weight: 600; margin-bottom: 2px; }
        .option-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; }

        .delete-dialog-actions {
            display: flex; gap: 10px; margin-top: 20px;
        }

        .delete-dialog-actions button {
            flex: 1; padding: 12px; border-radius: 12px;
            font-size: 0.9rem; font-weight: 700; cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: transform 0.12s;
        }

        .delete-dialog-actions button:active { transform: scale(0.97); }

        .delete-cancel {
            background: var(--bg-subtle); color: var(--text-muted);
            border: 1px solid var(--border-light);
        }

        .delete-confirm { background: var(--danger); color: #fff; border: none; }
        .delete-confirm:disabled { opacity: 0.35; cursor: not-allowed; }

        .card {
            width: 100%; background: var(--surface); border-radius: 20px;
            padding: 48px 28px 40px; text-align: center;
            box-shadow: 0 4px 24px var(--shadow); user-select: none;
            position: relative; overflow: hidden; min-height: 280px;
            border: 1px solid var(--border-light);
        }

        .card .english {
            font-family: 'Inter', sans-serif; font-size: 2rem;
            font-weight: 800; margin-bottom: 10px;
        }

        .card .cn-text {
            font-family: 'Noto Sans SC', sans-serif; font-size: 1.4rem;
            font-weight: 700; line-height: 1.6; margin-bottom: 10px;
        }

        .card .phonetic {
            color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px;
            font-family: 'Inter', sans-serif;
        }

        .card .meaning {
            font-size: 1.3rem; line-height: 1.7; height: 4em;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
        }

        .card .score-tag {
            position: absolute; top: 12px; right: 14px;
            font-family: 'Inter', sans-serif; font-size: 0.75rem;
            font-weight: 700; padding: 3px 10px; border-radius: 20px;
        }

        .card .phase-tag {
            position: absolute; top: 14px; left: 14px;
            font-size: 0.68rem; font-weight: 600;
            color: var(--text-muted); opacity: 0.6; letter-spacing: 0.05em;
        }

        .score-low  { background: var(--success-bg);  color: var(--success); }
        .score-mid  { background: var(--accent-bg);    color: var(--accent);  }
        .score-high { background: var(--danger-bg);    color: var(--danger);  }

        #actionBtns {
            display: flex; flex-direction: row; gap: 12px;
            width: 100%; max-width: 320px; margin-top: 20px; min-height: 52px;
        }

        .action-btn {
            flex: 1; padding: 14px 8px; border-radius: 14px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.12s;
            text-align: center;
        }

        .action-btn:active { transform: scale(0.95); }

        .btn-known {
            background: var(--success-bg); color: var(--success);
            border: 1px solid var(--success-border);
        }

        .btn-known.active {
            background: var(--success); color: #fff; border-color: var(--success);
        }

        .btn-arrow {
            background: var(--bg-subtle); color: var(--text-muted);
            border: 1px solid var(--border-light); font-size: 1.2rem;
        }

        .btn-detail {
            background: var(--accent-bg); color: var(--accent);
            border: 1px solid var(--accent);
            font-size: 0.85rem;
        }

        .btn-round {
            background: var(--accent); color: #fff; padding: 14px 32px;
            border: none; border-radius: 14px; font-size: 0.95rem;
            font-weight: 700; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
            margin-top: 16px; transition: transform 0.15s;
        }

        .btn-round:active { transform: scale(0.96); }
        .round-card { padding: 36px 28px; }

        .round-title {
            font-family: 'Inter', sans-serif; font-size: 1.5rem;
            font-weight: 700; margin-bottom: 16px;
        }

        .round-detail { color: var(--text-muted); font-size: 0.9rem; line-height: 1.8; }

        .report-overlay {
            position: fixed; inset: 0; background: rgba(248, 244, 236, 0.97);
            z-index: 100; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 40px 16px 60px; display: flex; flex-direction: column; align-items: center;
        }

        .report-overlay h2 { font-size: 1.4rem; margin-bottom: 6px; }

        .report-summary {
            color: var(--text-muted); font-size: 0.82rem;
            text-align: center; line-height: 1.7; margin-bottom: 28px;
        }

        .report-summary strong { color: var(--accent); }

        .report-section { width: 100%; max-width: 440px; margin-bottom: 24px; }
        .report-section h3 { font-size: 0.88rem; font-weight: 700; margin-bottom: 10px; }
        .report-table { width: 100%; border-collapse: collapse; }

        .report-table th {
            text-align: left; color: var(--text-muted); font-size: 0.7rem;
            font-weight: 600; padding: 6px 10px;
            border-bottom: 1px solid var(--border-light);
        }

        .report-table td {
            padding: 9px 10px; font-size: 0.85rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }

        .report-score-badge {
            display: inline-block; width: 26px; height: 22px;
            line-height: 22px; text-align: center; border-radius: 6px;
            font-size: 0.72rem; font-weight: 700; font-family: 'Inter', sans-serif;
        }

        .report-actions {
            margin-top: 8px; display: flex; flex-direction: column; gap: 10px;
            align-items: center; width: 100%; max-width: 280px;
        }

        .report-btn {
            width: 100%; padding: 14px 24px; border: none; border-radius: 14px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif; transition: transform 0.15s;
        }

        .report-btn:active { transform: scale(0.96); }
        .report-btn-primary { background: var(--accent); color: #fff; }

        .report-btn-secondary {
            background: var(--bg-subtle); color: var(--text-muted);
            border: 1px solid var(--border-light);
        }

        .selector-card {
            width: 100%; background: var(--surface); border-radius: 20px;
            padding: 28px 20px 24px;
            box-shadow: 0 4px 24px var(--shadow);
            border: 1px solid var(--border-light);
        }

        .selector-title {
            font-size: 1.2rem; font-weight: 700; text-align: center; margin-bottom: 24px;
        }

        .book-section { margin-bottom: 6px; }

        .book-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; cursor: pointer; border-radius: 10px;
            transition: background 0.15s;
        }

        .book-header:hover { background: var(--bg-subtle); }
        .book-name { font-size: 0.88rem; font-weight: 600; }

        .book-arrow {
            font-size: 0.75rem; color: var(--text-muted); transition: transform 0.2s ease;
        }

        .book-section.collapsed .book-arrow { transform: rotate(-90deg); }
        .book-units { padding: 0 0 6px 0; }
        .book-section.collapsed .book-units { display: none; }

        .unit-item {
            display: flex; align-items: center; padding: 10px 12px 10px 16px;
            cursor: pointer; border-radius: 10px; transition: background 0.15s; gap: 10px;
        }

        .unit-item:hover { background: var(--bg-subtle); }
        .unit-item input[type="checkbox"] { display: none; }

        .unit-checkmark {
            width: 20px; height: 20px; flex-shrink: 0;
            border: 2px solid rgba(0,0,0,0.15); border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; font-size: 0.7rem;
        }

        .unit-item input:checked ~ .unit-checkmark {
            background: var(--accent); border-color: var(--accent);
            color: #fff; font-weight: 700;
        }

        .unit-name { flex: 1; font-size: 0.9rem; }
        .unit-count { font-size: 0.75rem; color: var(--text-muted); }

        .selector-divider { height: 1px; background: var(--border-light); margin: 16px 0; }

        .selector-info {
            text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;
        }

        .selector-info strong { color: var(--accent); font-size: 1.1rem; }

        .config-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; gap: 12px;
        }

        .config-label { font-size: 0.85rem; flex-shrink: 0; }

        .count-stepper {
            display: flex; align-items: center; gap: 0;
            border: 1px solid rgba(0,0,0,0.12); border-radius: 10px; overflow: hidden;
        }

        .count-stepper button {
            background: var(--bg-subtle); border: none; color: var(--text-primary);
            width: 40px; height: 36px; font-size: 1.1rem; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: background 0.15s;
        }

        .count-stepper button:hover { background: rgba(0,0,0,0.07); }

        .count-stepper .count-display {
            width: 50px; text-align: center; font-size: 1rem; font-weight: 700;
            font-family: 'Inter', sans-serif; background: none; border: none;
            color: var(--text-primary); height: 36px; line-height: 36px;
            border-left: 1px solid var(--border-light);
            border-right: 1px solid var(--border-light);
        }

        .btn-all {
            background: var(--bg-subtle); border: 1px solid rgba(0,0,0,0.1);
            color: var(--text-muted); padding: 8px 14px; border-radius: 8px;
            font-size: 0.8rem; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.15s;
        }

        .btn-all:hover { border-color: var(--accent); color: var(--accent); }

        .strategy-btns { display: flex; gap: 0; border-radius: 10px; overflow: hidden; }

        .strat-btn {
            padding: 8px 16px; border: 1px solid rgba(0,0,0,0.12);
            background: var(--bg-subtle); color: var(--text-muted);
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif; transition: all 0.15s;
        }

        .strat-btn:first-child { border-radius: 10px 0 0 10px; border-right: none; }
        .strat-btn:last-child  { border-radius: 0 10px 10px 0; }

        .strat-btn.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }

        .strat-btn.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        .warning-text {
            font-size: 0.78rem; color: var(--danger); line-height: 1.6;
            margin: -8px 0 16px 0; padding: 0 4px;
        }

        .start-btn {
            width: 100%; padding: 14px; margin-top: 8px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 14px; font-size: 1rem;
            font-weight: 700; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
            transition: transform 0.15s, opacity 0.15s;
        }

        .start-btn:active { transform: scale(0.97); }
        .start-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .scoreboard-scroll {
            max-height: 50vh; overflow-y: auto;
            -webkit-overflow-scrolling: touch; padding-right: 4px;
        }

        .scoreboard-scroll::-webkit-scrollbar { width: 4px; }
        .scoreboard-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

        .scoreboard-row {
            display: flex; align-items: center; padding: 9px 8px;
            border-radius: 10px; transition: background 0.15s; gap: 8px;
        }

        .scoreboard-row:hover { background: var(--bg-subtle); }
        .scoreboard-word { flex: 1; font-size: 0.88rem; font-weight: 600; }

        .scoreboard-meta {
            font-size: 0.7rem; color: var(--text-muted);
            max-width: 100px; text-align: right; line-height: 1.4;
        }

        .scoreboard-actions {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; gap: 10px;
        }

        .scoreboard-actions .strat-btn { font-size: 0.8rem; }

        .scoreboard-badge {
            display: inline-block; min-width: 26px; height: 22px;
            line-height: 22px; text-align: center; border-radius: 6px;
            font-size: 0.72rem; font-weight: 700; font-family: 'Inter', sans-serif;
            padding: 0 6px;
        }

        .scoreboard-badge-empty {
            color: var(--text-muted); font-size: 0.72rem; font-family: 'Inter', sans-serif;
        }

        .unit-tags {
            display: flex; flex-wrap: wrap; gap: 8px;
            justify-content: center; margin-bottom: 14px;
        }

        .unit-tag {
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.1);
            background: var(--bg-subtle);
            color: var(--text-muted); font-size: 0.78rem;
            font-weight: 600; cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif; transition: all 0.2s;
        }

        .unit-tag:hover { border-color: var(--accent); color: var(--accent); }

        .unit-tag.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }

        @keyframes meaningReveal {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .meaning-animate { animation: meaningReveal 0.35s ease forwards; }

        .spell-wrap {
            display: flex; gap: 8px;

    <script>
        // =============================================

        var SUPABASE_URL = 'https://suvinowselchywjhuaig.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1dmlub3dzZWxjaHl3amh1YWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NDU4OTYsImV4cCI6MjA5OTQyMTg5Nn0.rC1xV0rhII4Pl5Wtx2T5kouKUWc-6xFYa-78vGnUM-U';
        var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var USER_ID = null;
        var USER_NAME = null;
        var manageMode = false;

        // =============================================
        //  用户身份
        // =============================================

        function nameToUUID(name) {
            var hash1 = 5381;
            var hash2 = 1234567;
            for (var i = 0; i < name.length; i++) {
                var c = name.charCodeAt(i);
                hash1 = ((hash1 << 5) + hash1 + c) & 0xffffffff;
                hash2 = ((hash2 << 3) + hash2 + c * 7) & 0xffffffff;
            }
            var h1 = ('00000000' + (hash1 >>> 0).toString(16)).slice(-8);
            var h2 = ('00000000' + (hash2 >>> 0).toString(16)).slice(-8);
            return h1 + '-' + h2.slice(0, 4) + '-' + h2.slice(4, 8) + '-0000-' + (h1 + h2).split('').reverse().join('').slice(0, 12);
        }

        function loadUser() {
            try {
                var raw = localStorage.getItem("vocab_user");
                if (raw) {
                    var d = JSON.parse(raw);
                    USER_NAME = d.name;
                    USER_ID = d.id;
                    return true;
                }
            } catch (e) {}
            return false;
        }

        function saveUser(name) {
            USER_NAME = name;
            USER_ID = nameToUUID(name);
            try {
                localStorage.setItem("vocab_user", JSON.stringify({ name: name, id: USER_ID }));
            } catch (e) {}
        }

        function logoutUser() {
            USER_NAME = null;
            USER_ID = null;
            try {
                localStorage.removeItem("vocab_user");
            } catch (e) {}
        }

        function updateUserBadge() {
            var badge = document.getElementById("userBadge");
            var label = document.getElementById("userNameLabel");
            if (USER_NAME) {
                badge.style.display = "";
                label.textContent = USER_NAME;
            } else {
                badge.style.display = "none";
            }
        }

        function handleUserBadge() {
            var hasProgress = false;
            if (USER_ID) {
                try {
                    var raw = localStorage.getItem(progressKey());
                    hasProgress = !!raw;
                } catch (e) {}
            }

            if (hasProgress) {
                if (!confirm("确定要中断当前学习吗？\n进行中的进度将不会保留。")) {
                    return;
                }
                clearProgress();
            }

            logoutUser();
            showLogin();
        }

        // =============================================
        //  用户列表管理
        // =============================================

        function getAllUsers() {
            var users = [];
            try {
                var raw = localStorage.getItem("vocab_users_list");
                if (raw) users = JSON.parse(raw);
            } catch (e) {}
            return users;
        }

        function addUserToList(name) {
            var users = getAllUsers();
            if (users.indexOf(name) === -1) {
                users.push(name);
                try { localStorage.setItem("vocab_users_list", JSON.stringify(users)); }
                catch (e) {}
            }
        }

        function removeUserFromList(name) {
            var users = getAllUsers();
            var idx = users.indexOf(name);
            if (idx !== -1) {
                users.splice(idx, 1);
                try { localStorage.setItem("vocab_users_list", JSON.stringify(users)); }
                catch (e) {}
            }
        }

        // =============================================
        //  登录界面
        // =============================================

        function showLogin() {
            manageMode = false;
            lastAction = null;
            document.getElementById("progressBar").style.display = "none";
            document.getElementById("subtitle").textContent = "";
            document.getElementById("userBadge").style.display = "none";
            renderLoginCard();
        }

        function renderLoginCard() {
            var users = getAllUsers();
            var lastUser = null;
            try { var raw = localStorage.getItem("vocab_user"); if (raw) lastUser = JSON.parse(raw).name; } catch(e) {}

            var html = '<div class="login-card">';
            html += '  <div class="login-icon">📖</div>';
            html += '  <div class="login-title">VOCAB</div>';
            html += '  <div class="login-desc">输入你的名字，开始背单词<br>每人拥有独立的学习记录</div>';
            html += '  <div style="display:flex;gap:8px;align-items:center;">';
            html += '    <input class="login-input" id="loginName" type="text" maxlength="20"'
                 + ' placeholder="你的名字" style="flex:1;" oninput="validateLogin()" onkeydown="if(event.key===\'Enter\')handleLogin()">';
            html += '    <button class="login-btn" id="loginBtn" disabled onclick="handleLogin()" style="margin-top:0;width:auto;padding:14px 24px;flex-shrink:0;">进入</button>';
            html += '  </div>';

            if (users.length > 0) {
                html += '  <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border-light);">';
                html += '    <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:14px;">选一个名字快速进入</div>';
                html += '    <div class="user-chips' + (manageMode ? ' manage-mode' : '') + '" id="userChips">';
                users.forEach(function (u) {
                    var isLast = (u === lastUser);
                    html += '  <div class="user-chip' + (isLast ? ' is-last' : '') + '" data-name="' + escapeAttr(u) + '">';
                    html += '    <span class="chip-label" onclick="quickLogin(\'' + escapeStr(u) + '\')">' + u + (isLast ? ' · 上次' : '') + '</span>';
                    html += '    <button class="chip-delete" onclick="event.stopPropagation();promptDeleteUser(\'' + escapeStr(u) + '\')">✕</button>';
                    html += '  </div>';
                });
                html += '    </div>';
                html += '    <button class="manage-btn' + (manageMode ? ' active' : '') + '" onclick="toggleManageMode()">';
                html += '      ' + (manageMode ? '完成管理' : '⚙ 管理列表');
                html += '    </button>';
                html += '  </div>';
            }

            html += '</div>';
            document.getElementById("mainArea").innerHTML = html;

            setTimeout(function () {
                var input = document.getElementById("loginName");
                if (input && !manageMode) input.focus();
            }, 100);
        }

        function toggleManageMode() {
            manageMode = !manageMode;
            renderLoginCard();
        }

        function quickLogin(name) {
            if (manageMode) return;
            saveUser(name);
            updateUserBadge();
            enterApp();
        }

        function validateLogin() {
            var name = document.getElementById("loginName").value.trim();
            document.getElementById("loginBtn").disabled = (name.length === 0);
        }

        function handleLogin() {
            var name = document.getElementById("loginName").value.trim();
            if (!name) return;
            saveUser(name);
            addUserToList(name);
            updateUserBadge();
            enterApp();
        }

        // [改动] enterApp: 读本地缓存立即渲染，后台同步云端
        function enterApp() {
            syncFromCloud();
            if (loadProgress()) {
                document.getElementById("progressBar").style.display = "";
                updateStats();
                renderCard();
            } else {
                showSelector();
            }
        }

        // =============================================
        //  删除用户（确认弹窗）
        // =============================================

        function promptDeleteUser(name) {
            var overlay = document.createElement("div");
            overlay.className = "delete-overlay";
            overlay.id = "deleteOverlay";
            overlay.innerHTML =
                '<div class="delete-dialog">'
              + '  <div class="delete-dialog-title">删除「' + name + '」</div>'
              + '  <div class="delete-dialog-subtitle">选择删除方式</div>'
              + '  <div class="delete-option selected" id="optKeep" onclick="selectDeleteOption(\'keep\')">'
              + '    <input type="radio" name="deleteMode" value="keep" checked>'
              + '    <span class="option-dot"></span>'
              + '    <div class="option-text">'
              + '      <div class="option-title">保留学习记录</div>'
              + '      <div class="option-desc">只移除名字，云端数据保留<br>以后用同一名字登录可恢复</div>'
              + '    </div>'
              + '  </div>'
              + '  <div class="delete-option" id="optAll" onclick="selectDeleteOption(\'all\')">'
              + '    <input type="radio" name="deleteMode" value="all">'
              + '    <span class="option-dot"></span>'
              + '    <div class="option-text">'
              + '      <div class="option-title">彻底删除所有数据</div>'
              + '      <div class="option-desc">移除名字，云端历史分数和<br>学习记录全部清除，不可恢复</div>'
              + '    </div>'
              + '  </div>'
              + '  <div class="delete-dialog-actions">'
              + '    <button class="delete-cancel" onclick="closeDeleteDialog()">取消</button>'
              + '    <button class="delete-confirm" onclick="confirmDeleteUser(\'' + escapeStr(name) + '\')">删除</button>'
              + '  </div>'
              + '</div>';
            document.body.appendChild(overlay);
        }

        function selectDeleteOption(mode) {
            var keep = document.getElementById("optKeep");
            var all = document.getElementById("optAll");
            keep.classList.toggle("selected", mode === "keep");
            all.classList.toggle("selected", mode === "all");
            keep.querySelector("input").checked = (mode === "keep");
            all.querySelector("input").checked = (mode === "all");
        }

        function closeDeleteDialog() {
            var el = document.getElementById("deleteOverlay");
            if (el) el.remove();
        }

        // [改动] 彻底删除时同时清理本地缓存
        async function confirmDeleteUser(name) {
            var mode = document.querySelector('input[name="deleteMode"]:checked').value;
            var uid = nameToUUID(name);

            removeUserFromList(name);
            try { localStorage.removeItem("vocab_progress_" + uid); } catch (e) {}

            if (USER_NAME === name) { logoutUser(); }

            if (mode === "all") {
                // 清理本地缓存
                try {
                    localStorage.removeItem("vocab_history_" + uid);
                    localStorage.removeItem("vocab_sessions_" + uid);
                } catch (e) {}
                // 清理云端数据
                try {
                    await sb.from('vocab_history').delete().eq('user_id', uid);
                    await sb.from('vocab_sessions').delete().eq('user_id', uid);
                } catch (e) { console.warn('删除云端数据失败', e); }

            closeDeleteDialog();
            var users = getAllUsers();
            if (users.length === 0) { showLogin(); }
            else { renderLoginCard(); }

        // =============================================

        // =============================================

        var unitName = "";

        var currentRound = 1;
        var meaningShown = false;
        var currentChoice = null;
        var wordScores = {};
        var wordsLearnedRound = {};

        };

        var cachedNoHistUnits = [];

        // =============================================
        //  [新增] 本地缓存层
        // =============================================

        function cacheLoadHistory() {
            if (!USER_ID) return {};
            try {
                var raw = localStorage.getItem("vocab_history_" + USER_ID);
                if (raw) return JSON.parse(raw);
            } catch (e) {}
            return {};
        }

        function cacheSaveHistory(map) {
            if (!USER_ID) return;
            try {
                localStorage.setItem("vocab_history_" + USER_ID, JSON.stringify(map));
            } catch (e) {}
        }

        function cacheLoadSessions() {
            if (!USER_ID) return [];
            try {
                var raw = localStorage.getItem("vocab_sessions_" + USER_ID);
                if (raw) return JSON.parse(raw);
            } catch (e) {}
            return [];
        }

        function cacheSaveSessions(dates) {
            if (!USER_ID) return;
            try {
                localStorage.setItem("vocab_sessions_" + USER_ID, JSON.stringify(dates));
            } catch (e) {}
        }

        function mergeHistory(local, cloud) {
            var merged = {};
            var allKeys = {};
            for (var k in local) allKeys[k] = true;
            for (var k in cloud) allKeys[k] = true;
            for (var k in allKeys) {
                var lArr = local[k] || [];
                var cArr = cloud[k] || [];
                merged[k] = lArr.length >= cArr.length ? lArr : cArr;
            }
            return merged;
        }

        function mergeSessions(local, cloud) {
            var merged = {};
            local.forEach(function (d) { merged[d] = true; });
            cloud.forEach(function (d) { merged[d] = true; });
            return Object.keys(merged).sort();
        }

        // =============================================
        //  [改动] 云端操作（仅用于同步）
        // =============================================

        async function cloudFetchHistory() {
            if (!USER_ID) return {};
            try {
                var { data, error } = await sb.from('vocab_history')
                    .select('word, scores')
                    .eq('user_id', USER_ID);
                if (error) { console.warn(error); return {}; }
                var result = {};
                if (data) data.forEach(function (row) {
                    result[row.word] = row.scores || [];
                });
                return result;
            } catch (e) { return {}; }
        }

        async function cloudPushHistory(historyMap) {
            if (!USER_ID) return;
            try {
                var words = Object.keys(historyMap);
                if (words.length === 0) return;

                var { data: existing } = await sb.from('vocab_history')
                    .select('word')
                    .eq('user_id', USER_ID);

                var existingWords = {};
                if (existing) existing.forEach(function (r) { existingWords[r.word] = true; });

                var toInsert = [];
                var toUpdate = [];

                words.forEach(function (w) {
                    if (existingWords[w]) {
                        toUpdate.push({ user_id: USER_ID, word: w, scores: historyMap[w] });
                    } else {
                        toInsert.push({ user_id: USER_ID, word: w, scores: historyMap[w] });
                    }
                });

                // 并行执行所有写入
                var promises = [];
                if (toInsert.length > 0) {
                    promises.push(sb.from('vocab_history').insert(toInsert));
                }
                for (var i = 0; i < toUpdate.length; i++) {
                    promises.push(
                        sb.from('vocab_history')
                            .update({ scores: toUpdate[i].scores })
                            .eq('user_id', USER_ID)
                            .eq('word', toUpdate[i].word)
                    );
                }
                if (promises.length > 0) {
                    await Promise.all(promises);
                }
            } catch (e) { console.warn('同步历史到云端失败', e); }
        }

        function escapeStr(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
        function escapeAttr(s) { return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }

        function normalizeForDisplay(text) {
            return text.replace(/…/g, ' ').replace(/\s+/g, ' ').trim();
        }

        // [改动] 去掉 -、…、— 和所有空格，容忍用户少打连接符
        function normalizeForCompare(text) {
            return text.toLowerCase()
                .replace(/…/g, '')
                .replace(/['']/g, "'")
                .replace(/[""]/g, '"')
                .replace(/—/g, '')
                .replace(/-/g, '')
                .replace(/\s+/g, '')
                .trim();
        }

        // [改动] 统一指数衰减加权
        function calcWeightedAvg(arr) {
            if (!arr || arr.length === 0) return 0;
            var n = arr.length;
            var decay = 0.6;
            var weightedSum = 0;
            var weightTotal = 0;
            for (var i = n - 1; i >= 0; i--) {
                var dist = n - 1 - i;
                var weight = Math.pow(decay, dist);
                weightedSum += arr[i] * weight;
                weightTotal += weight;
            }
            return weightedSum / weightTotal;
        }

            var cleanText = text.replace(/…/g, ' ').replace(/\s+/g, ' ').trim();

            audio.play().catch(function() {});
        }

        // [改动] 读本地缓存
        function updateSelectedCount() {
            var cbs = document.querySelectorAll(".unit-checkbox");
            var total = 0;
            var noHistUnits = [];

            var history = cacheLoadHistory();

            cbs.forEach(function (cb) {
                if (cb.checked) {

                    var u = cb.getAttribute("data-unit");
                    total += wordBank[b][u].length;
                    var has = false;
                    var words = wordBank[b][u];
                    for (var i = 0; i < words.length; i++) {
                        if (history[words[i].en] && history[words[i].en].length > 0) {
                            has = true; break;
                        }
                    }
                    if (!has) noHistUnits.push(b + " · " + u);
                }
            });

            cachedNoHistUnits = noHistUnits;

            document.getElementById("selectedCount").textContent = total;

            var countEl = document.getElementById("countDisplay");
            var cur = parseInt(countEl.textContent) || 20;
            if (total > 0 && cur > total) countEl.textContent = total;
            if (total === 0) countEl.textContent = 0;

            var warnEl = document.getElementById("strategyWarning");
            var weakBtn = document.querySelector('.strat-btn[data-strategy="weakest"]');

            if (noHistUnits.length > 0) {
                weakBtn.classList.add("disabled");
                if (currentStrategy === "weakest") {
                    setStrategy("random");
                } else {
                    warnEl.style.display = "none";

            } else {
                warnEl.style.display = "none";
                weakBtn.classList.remove("disabled");

        function adjustCount(delta) {
            var el = document.getElementById("countDisplay");
            var total = parseInt(document.getElementById("selectedCount").textContent) || 0;
            var cur = parseInt(el.textContent) || 0;
            var next;

            if (delta > 0) {
                if (cur < 5) { next = 5; } else { next = cur + 5; }
                if (next > total) next = total;
            } else {
                if (cur <= 5) { next = 1; } else { next = cur - 5; }
            }

            if (next < 1) next = 1;
            el.textContent = next;
        }

        function importData() {
            var input = document.createElement("input");
            input.type = "file";
            input.accept = ".json";
            input.onchange = function (e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function (ev) {
                    try {
                        var data = JSON.parse(ev.target.result);
                        if (!data.version || !data.history || !data.sessions) {
                            alert("文件格式不正确，无法导入。");
                            return;
                        }
                        var importUser = data.userName || "未知用户";
                        var currentUser = "";
                        try { var raw = localStorage.getItem("vocab_user"); if (raw) currentUser = JSON.parse(raw).name; } catch (e) { }
                        if (importUser && currentUser && importUser !== currentUser) {
                            if (!confirm("这个数据来自「" + importUser + "」，确定要导入到「" + currentUser + "」的记录中吗？")) return;
                        }
                        var localHistory = cacheLoadHistory();
                        var mergedHistory = mergeHistory(localHistory, data.history);
                        cacheSaveHistory(mergedHistory);
                        var localSessions = cacheLoadSessions();
                        var mergedSessions = mergeSessions(localSessions, data.sessions);
                        cacheSaveSessions(mergedSessions);
                        pushImportedSessions(data.sessions);
                        alert("导入成功！已合并 " + Object.keys(mergedHistory).length + " 个单词的记录和 " + mergedSessions.length + " 天学习记录。");
                        showSelector();
                    } catch (ex) {
                        alert("文件解析失败：" + ex.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // =============================================
        //  选词策略
        // =============================================

        function pickRandom(pool, count) {
            var arr = pool.slice();
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
            }
            return arr.slice(0, count);
        }

        // [改动] 读本地缓存
        function pickWeakest(pool, count) {
            var history = cacheLoadHistory();
            var items = pool.map(function (w) {
                var arr = history[w.en];
                var weaknessScore = 0, has = false;
                if (arr && arr.length > 0) {
                    has = true;
                    var n = arr.length;
                    var weightedAvg = calcWeightedAvg(arr);
                    var countBoost = 1 + Math.log(Math.max(1, n)) * 0.2;
                    weaknessScore = weightedAvg * countBoost;
                }
                return { word: w, weaknessScore: weaknessScore, hasHistory: has };
            });
            items.sort(function (a, b) {
                if (a.hasHistory && !b.hasHistory) return -1;
                if (!a.hasHistory && b.hasHistory) return 1;
                return b.weaknessScore - a.weaknessScore;
            });
            return items.slice(0, count).map(function (it) { return it.word; });
        }

        // =============================================
        //  开始学习
        // =============================================

        async function startFromSelector() {
            var cbs = document.querySelectorAll(".unit-checkbox:checked");
            if (cbs.length === 0) return;

            var selectedUnits = [];
            var pool = [];
            cbs.forEach(function (cb) {
                var b = cb.getAttribute("data-book");
                var u = cb.getAttribute("data-unit");
                selectedUnits.push({ book: b, unit: u });
                pool = pool.concat(wordBank[b][u]);
            });

            var count = parseInt(document.getElementById("countDisplay").textContent) || 20;
            count = Math.min(count, pool.length);
            if (count <= 0) return;

            var words;
            if (currentStrategy === "weakest") {
                words = pickWeakest(pool, count);
            } else {
                words = pickRandom(pool, count);
            }

            sessionConfig = {
                selectedUnits: selectedUnits,
                wordCount: count,
                strategy: currentStrategy
            };

            startSession(words);
        }

        function startSession(words) {
            lastAction = null;

            if (sessionConfig.selectedUnits.length === 1) {
                bookName = sessionConfig.selectedUnits[0].book;
                unitName = sessionConfig.selectedUnits[0].unit;
            } else {
                bookName = sessionConfig.selectedUnits.length + " 个单元";
                unitName = "共 " + words.length + " 词";
            }

            allWords = words.slice();
            remainingWords = allWords.slice();
            currentIndex = 0;
            currentRound = 1;
            currentPhase = "en2cn";
            wordScores = {};
            wordsLearnedRound = {};
            allWords.forEach(function (w) {
                wordScores[w.en] = 0;
                wordsLearnedRound[w.en] = 0;
            });

            document.getElementById("progressBar").style.display = "";
            saveProgress();
            updateStats();
            renderCard();
        }

        // =============================================
        //  统计
        // =============================================

        function getScoreStyle(score) {
            if (score <= 2) return "score-low";
            if (score <= 4) return "score-mid";
            return "score-high";
        }

        function updateStats() {
            // 中→英阶段只计算需要默写的词
            var total = allWords.length;
            if (currentPhase === "cn2en") {
                total = 0;
                for (var i = 0; i < allWords.length; i++) {
                    if (allWords[i].spell !== false) total++;
                }
            }
            var left = remainingWords.length;
            var done = total - left;
            var pct = total > 0 ? Math.round(done / total * 100) : 0;

            var label = bookName;
            if (bookName !== unitName && unitName) label += " · " + unitName;
            document.getElementById("subtitle").textContent = label;

            var phaseLabel = currentPhase === "en2cn" ? "英→中" : "中→英";
            document.getElementById("roundInfo").textContent = phaseLabel + " · 第 " + currentRound + " 轮";
            document.getElementById("countInfo").textContent = "剩余 " + left + " / " + total;
            document.getElementById("progressFill").style.width = pct + "%";
        }

        // =============================================
        //  卡片交互
        // =============================================

        function renderCard() {
            if (remainingWords.length === 0) {
                if (currentPhase === "en2cn") { showPhaseTransition(); }
                else { showReport(); }
                return;
            }
            if (currentIndex >= remainingWords.length) { showRoundEnd(); return; }

            var word = remainingWords[currentIndex];
            var score = wordScores[word.en];
            var scoreClass = getScoreStyle(score);
            meaningShown = false;
            currentChoice = null;

            var phaseTag = currentPhase === "en2cn" ? "英→中" : "中→英";

            var html = '<div class="card">';
            html += '  <div class="phase-tag">' + phaseTag + '</div>';
            html += '  <div class="score-tag ' + scoreClass + '">' + score + '</div>';

            if (currentPhase === "en2cn") {
                html += '  <div class="english" onclick="speakEnglish(\'' + escapeStr(word.en) + '\')" style="cursor:pointer;" title="点击发音">' + normalizeForDisplay(word.en) + '</div>';
                html += '  <div class="phonetic">' + word.phonetic + '</div>';
            } else {
                html += '  <div class="cn-text">' + word.cn + '</div>';
                html += '  <div class="phonetic" style="visibility:hidden;">' + word.phonetic + '</div>';
            }

            html += '  <div class="meaning" id="meaningArea">';
            if (currentPhase === "cn2en") {

                html += '      <input class="spell-input" id="spellInput" type="text"'
                     + ' autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"'
                     + ' placeholder="拼写英文单词"'
                     + ' onkeydown="if(event.key===\'Enter\')checkSpelling()">';
                html += '      <button class="spell-confirm" onclick="checkSpelling()">确认</button>';
                html += '    </div>';
                html += '    <div id="spellFeedback"></div>';
            }
            html += '  </div>';
            html += '</div>';
            var hasDetail = wordDetail && wordDetail[word.en];

            html += '<div id="actionBtns">';
            html += '  <button class="action-btn btn-known" id="btnKnown" onclick="handleBtn(\'known\')">已会</button>';
            if (hasDetail) {
                html += '  <button class="action-btn btn-detail" onclick="showDetail(allWords[currentIndex])">拓展</button>';
            }
            html += '  <button class="action-btn btn-arrow" onclick="handleBtn(\'arrow\')">→</button>';
            html += '</div>';

            document.getElementById("mainArea").innerHTML = html;

            if (currentPhase === "cn2en") {
                setTimeout(function () {
                    var inp = document.getElementById("spellInput");
                    if (inp) inp.focus();
                }, 100);
            }

            if (autoPlay && currentPhase === "en2cn") {
                speakEnglish(word.en);
            }
